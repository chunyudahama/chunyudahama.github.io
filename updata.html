<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Effect</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2rem;
            text-align: center;
            pointer-events: none;
            animation: fade-in 2s ease-in-out;
        }
        @keyframes fade-in {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <canvas id="fireworksCanvas"></canvas>
    <div class="message">Happy New Year! 🎆✨</div>

    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const fireworks = [];

        class Firework {
            constructor(x, y, targetY, color) {
                this.x = x;
                this.y = y;
                this.targetY = targetY;
                this.color = color;
                this.velocityY = -8;
                this.trail = [];
                this.exploded = false;
            }

            draw() {
                // Draw the trail
                this.trail.forEach((trailPart, index) => {
                    ctx.beginPath();
                    ctx.arc(trailPart.x, trailPart.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${trailPart.color}, ${trailPart.opacity})`;
                    ctx.fill();
                    ctx.closePath();

                    trailPart.opacity -= 0.05;
                    if (trailPart.opacity <= 0) this.trail.splice(index, 1);
                });

                // Draw the firework itself
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }

            update() {
                if (this.y > this.targetY) {
                    this.trail.push({ x: this.x, y: this.y, color: "255, 255, 255", opacity: 0.8 });
                    this.y += this.velocityY;
                } else {
                    this.exploded = true;
                    createExplosion(this.x, this.y, this.color);
                }
            }
        }

        class Particle {
            constructor(x, y, color, velocityX, velocityY) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocityX = velocityX;
                this.velocityY = velocityY;
                this.life = 100;
                this.opacity = 1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                ctx.fill();
                ctx.closePath();
            }

            update() {
                this.x += this.velocityX;
                this.y += this.velocityY;
                this.velocityY += 0.03; // Gravity effect
                this.opacity -= 0.01;
                this.life -= 1;
            }
        }

        function createFirework(x, y, isManual = false) {
            const colors = ['255, 63, 129', '255, 175, 63', '63, 175, 255', '129, 255, 63', '255, 63, 63'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            const targetY = isManual ? y : Math.random() * canvas.height / 2;

            fireworks.push(new Firework(x, canvas.height, targetY, `rgb(${color})`));
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 100; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 1;
                const velocityX = Math.cos(angle) * speed;
                const velocityY = Math.sin(angle) * speed;
                particles.push(new Particle(x, y, color, velocityX, velocityY));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            fireworks.forEach((firework, index) => {
                firework.update();
                firework.draw();
                if (firework.exploded) {
                    fireworks.splice(index, 1);
                }
            });

            particles.forEach((particle, index) => {
                particle.update();
                particle.draw();
                if (particle.life <= 0 || particle.opacity <= 0) {
                    particles.splice(index, 1);
                }
            });

            requestAnimationFrame(animate);
        }

        setInterval(() => createFirework(Math.random() * canvas.width, canvas.height), 500);
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        canvas.addEventListener('click', (event) => {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            createFirework(x, y, true);
        });
    </script>
</body>
</html>
